<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qr-science // TERMINAL v1.337</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="terminal-header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-text">qr-science</span>
                <span class="blink">_</span>
            </div>
            <div class="status-bar">
                <span class="status-dot"></span>
                <span>CONNECTED // HACKER MODE ACTIVE</span>
            </div>
        </div>
        
        <div class="header-center">
            <div class="search-box">
                <span class="search-icon">❯</span>
                <input type="text" id="search-input" placeholder="SEARCH GAMES... /ENTER" autocomplete="off">
            </div>
        </div>
        
        <div class="header-right">
            <div id="datetime" class="datetime"></div>
            <button id="theme-toggle" class="theme-btn" title="TOGGLE LIGHT/DARK">☀️</button>
            <button id="favorites-toggle" class="fav-toggle-btn">
                <span id="fav-text">ALL</span>
                <span class="star-icon">★</span>
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="terminal-title">
            <h1>AVAILABLE PAYLOADS // <span id="results-count">0</span> LOADED</h1>
            <div class="scanline"></div>
        </div>
        
        <div id="games-container" class="games-grid"></div>
        
        <div id="empty-state" class="empty-state hidden">
            <div class="empty-icon">404</div>
            <p>NO MATCHING PAYLOADS FOUND IN DATABASE</p>
            <button onclick="resetSearch()">RESET TERMINAL</button>
        </div>
    </main>

    <footer class="terminal-footer">
        <div>© 2026 qr-science // RETRO ARCADE PROTOCOL v0.8 // GITHUB DEPLOYED</div>
        <div class="footer-links">
            <a href="https://github.com" target="_blank">SOURCE</a>
            <span class="divider">|</span>
            <span id="footer-time"></span>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
