<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR-SCIENCE</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- SCANLINE OVERLAY -->
  <div class="scanlines"></div>

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="logo">
        <span class="logo-bracket">[</span>
        <span class="logo-text">QR<span class="logo-dash">-</span><span class="logo-science">SCIENCE</span></span>
        <span class="logo-bracket">]</span>
      </div>
      <div class="tagline">// access granted. play everything.</div>
    </div>

    <div class="header-right">
      <div class="datetime-block">
        <div class="clock" id="clock">00:00:00</div>
        <div class="date" id="date">MON 01 JAN 2000</div>
      </div>
      <button class="theme-toggle" id="themeToggle" title="Toggle Light/Dark Mode">
        <span id="themeIcon">◐</span>
      </button>
    </div>
  </header>

  <!-- TERMINAL BAR -->
  <div class="terminal-bar">
    <span class="terminal-prompt">root@qr-science:~$</span>
    <span class="terminal-text" id="terminalText"></span>
    <span class="terminal-cursor">█</span>
  </div>

  <!-- MAIN CONTENT -->
  <main>

    <!-- SEARCH + FILTER -->
    <div class="controls">
      <div class="search-wrapper">
        <span class="search-icon">&gt;_</span>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="search games..."
          autocomplete="off"
          spellcheck="false"
        />
        <button class="clear-btn" id="clearSearch" title="Clear">✕</button>
      </div>
      <div class="filter-tabs">
        <button class="tab active" data-filter="all">ALL</button>
        <button class="tab" data-filter="favorites">★ FAVORITES</button>
      </div>
    </div>

    <!-- STATS BAR -->
    <div class="stats-bar">
      <span id="gameCount">0 GAMES LOADED</span>
      <span class="stats-sep">|</span>
      <span id="favCount">0 FAVORITES</span>
    </div>

    <!-- GAME GRID -->
    <div class="game-grid" id="gameGrid">
      <!-- Cards injected by JS -->
    </div>

    <!-- NO RESULTS -->
    <div class="no-results hidden" id="noResults">
      <div class="no-results-text">
        <span class="glitch" data-text="// NO SIGNAL //">// NO SIGNAL //</span>
        <p>no games match your query.</p>
      </div>
    </div>

  </main>

  <!-- GAME FRAME OVERLAY -->
  <div class="game-overlay hidden" id="gameOverlay">
    <div class="overlay-header">
      <div class="overlay-title">
        <span class="overlay-bracket">[</span>
        <span id="overlayGameName">GAME</span>
        <span class="overlay-bracket">]</span>
      </div>
      <div class="overlay-controls">
        <button class="overlay-btn fav-overlay-btn" id="overlayFavBtn" title="Favorite">★</button>
        <button class="overlay-btn" id="overlayFullscreen" title="Fullscreen">⛶</button>
        <button class="overlay-btn close-btn" id="overlayClose" title="Close">✕</button>
      </div>
    </div>
    <iframe id="gameFrame" src="" frameborder="0" allowfullscreen></iframe>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div class="toast hidden" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
