<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Drive</title>
  <link rel="icon" href="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TOP BAR -->
  <header>
    <div class="logo" id="site-logo">QR-SCIENCE</div>
    <div class="header-right">
      <div class="clock-block">
        <span id="time-display">00:00:00</span>
        <span class="clock-sep">//</span>
        <span id="date-display">0000-00-00</span>
      </div>
      <button id="starboard-btn" class="pill-btn">★ STARBOARD</button>
      <button id="board-btn" class="pill-btn">📋 UPDATE BOARD</button>
      <button id="theme-toggle" class="pill-btn">
        <span id="theme-icon">◑</span> <span id="theme-label">LIGHT</span>
      </button>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <div class="layout">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="search-wrap">
          <span class="search-prefix">&gt;_</span>
          <input
            type="text"
            id="search-input"
            placeholder="SEARCH..."
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <div class="filter-tabs">
          <button class="tab-btn active" data-filter="all">ALL</button>
          <button class="tab-btn" data-filter="favorites">★ FAVS</button>
        </div>
        <div class="game-count" id="game-count">— GAMES</div>
      </div>

      <div class="game-list" id="game-list">
        <div class="list-loading" id="list-loading">
          LOADING<span class="blink">_</span>
        </div>
      </div>
    </aside>

    <!-- RIGHT DISPLAY AREA -->
    <main class="display-area">
      <div class="display-header">
        <span class="display-label" id="display-label">LOOKING FOR GAME</span>
        <div class="display-controls" id="display-controls">
          <button id="btn-fullscreen" class="pill-btn">⛶ FULLSCREEN</button>
          <button id="btn-exit" class="pill-btn exit-btn">✕ EXIT</button>
        </div>
      </div>

      <div class="display-box" id="display-box">
        <div class="idle-screen" id="idle-screen">
          <span class="idle-text">LOOKING FOR GAME<span class="blink">_</span></span>
        </div>
        <iframe
          id="game-frame"
          src=""
          frameborder="0"
          allowfullscreen
          allow="autoplay; fullscreen"
        ></iframe>
      </div>
    </main>

  </div>

  <!-- UPDATE BOARD MODAL -->
  <div id="board-modal" class="board-backdrop hidden">
    <div class="board-panel">
      <div class="board-header">
        <span class="board-title">📋 UPDATE BOARD</span>
        <div class="board-header-right">
          <button id="board-edit-btn" class="pill-btn">✎ EDIT</button>
          <button id="board-close" class="pill-btn exit-btn">✕</button>
        </div>
      </div>

      <!-- READ VIEW -->
      <div id="board-read" class="board-body"></div>

      <!-- EDIT VIEW -->
      <div id="board-edit" class="board-edit-wrap hidden">
        <div class="board-edit-hint">
          Edit each entry below. Separate entries with a blank line starting with <code>---</code>.
          Changes are saved to this browser. Update <code>BOARD_UPDATES</code> in script.js to publish to everyone.
        </div>
        <textarea id="board-textarea" class="board-textarea" spellcheck="false"></textarea>
        <div class="board-edit-actions">
          <button id="board-save" class="pill-btn">✔ SAVE</button>
          <button id="board-cancel" class="pill-btn">✕ CANCEL</button>
          <button id="board-reset" class="pill-btn board-reset-btn">↺ RESET TO DEFAULT</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
