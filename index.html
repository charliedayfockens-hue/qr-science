<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cool Science Games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-bar">
        <span class="site-brand">Cool Science Games</span>
        <div class="clock-block">
            <span id="clockTime"></span>
            <span id="clockDate"></span>
        </div>
        <div class="top-actions">
            <button id="favFilterBtn" class="top-btn">⭐ Favorites</button>
            <div class="cloak-wrap">
                <button id="cloakBtn" class="top-btn">🎭</button>
                <div id="cloakMenu" class="cloak-menu" style="display:none;">
                    <button class="cloak-opt" data-cloak="none">None</button>
                    <button class="cloak-opt" data-cloak="schoology">Schoology</button>
                    <button class="cloak-opt" data-cloak="google-classroom">Google Classroom</button>
                    <button class="cloak-opt" data-cloak="zoom">Zoom</button>
                    <button class="cloak-opt" data-cloak="google">Google</button>
                    <button class="cloak-opt" data-cloak="youtube">YouTube</button>
                </div>
            </div>
        </div>
    </header>

    <div class="counter-strip"><span id="gameCounter"></span></div>

    <div id="gamesGrid" class="games-grid"></div>
    <div id="noResults" class="no-results" style="display:none;">No games found.</div>

    <script src="script.js"></script>
</body>
</html>
