<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Drive</title>
  <link rel="icon" href="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TOP BAR -->
  <header>
    <div class="logo" id="site-logo">QR-SCIENCE</div>
    <div class="header-right">
      <div class="clock-block">
        <span id="time-display">00:00:00</span>
        <span class="clock-sep">//</span>
        <span id="date-display">0000-00-00</span>
      </div>
      <button id="request-btn" class="pill-btn">+ REQUEST GAME</button>
      <button id="theme-toggle" class="pill-btn">
        <span id="theme-icon">◑</span> <span id="theme-label">LIGHT</span>
      </button>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <div class="layout">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="search-wrap">
          <span class="search-prefix">&gt;_</span>
          <input
            type="text"
            id="search-input"
            placeholder="SEARCH..."
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <div class="filter-tabs">
          <button class="tab-btn active" data-filter="all">ALL</button>
          <button class="tab-btn" data-filter="favorites">★ FAVS</button>
        </div>
        <button id="recent-btn" class="recent-btn">⟳ RECENTLY ADDED</button>
        <div class="game-count" id="game-count">— GAMES</div>
      </div>

      <div class="game-list" id="game-list">
        <div class="list-loading" id="list-loading">
          LOADING<span class="blink">_</span>
        </div>
      </div>
    </aside>

    <!-- RIGHT DISPLAY AREA -->
    <main class="display-area">
      <div class="display-header">
        <span class="display-label" id="display-label">LOOKING FOR GAME</span>
        <div class="display-controls" id="display-controls">
          <button id="btn-fullscreen" class="pill-btn">⛶ FULLSCREEN</button>
          <button id="btn-exit" class="pill-btn exit-btn">✕ EXIT</button>
        </div>
      </div>

      <div class="display-box" id="display-box">
        <div class="idle-screen" id="idle-screen">
          <span class="idle-text">LOOKING FOR GAME<span class="blink">_</span></span>
        </div>
        <iframe
          id="game-frame"
          src=""
          frameborder="0"
          allowfullscreen
          allow="autoplay; fullscreen"
        ></iframe>
      </div>
    </main>

  </div>

  <!-- RECENTLY ADDED MODAL -->
  <div id="recent-modal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">⟳ RECENTLY ADDED <span class="modal-sub">// LAST 7 DAYS</span></span>
        <button id="recent-close" class="pill-btn">✕ CLOSE</button>
      </div>
      <div class="modal-body" id="recent-body">
        <div class="modal-loading">FETCHING COMMITS<span class="blink">_</span></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
