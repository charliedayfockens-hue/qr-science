<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>More Cool Science Games</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- NOISE OVERLAY -->
  <div class="noise"></div>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-glow"></div>
    <div class="header-inner">
      <div class="logo-block">
        <span class="logo-icon">⚗️</span>
        <div class="logo-text">
          <span class="logo-main">More Cool</span>
          <span class="logo-sub">Science Games</span>
        </div>
      </div>
      <nav class="category-nav" id="categoryNav">
        <button class="cat-btn active" data-cat="All">All</button>
      </nav>
    </div>
  </header>

  <!-- SEARCH BAR -->
  <div class="search-row">
    <div class="search-wrap">
      <span class="search-icon">🔬</span>
      <input type="text" id="searchInput" placeholder="Search simulations..." autocomplete="off" />
      <span class="search-clear" id="searchClear">✕</span>
    </div>
    <div class="result-count" id="resultCount"></div>
  </div>

  <!-- GAME GRID -->
  <main class="game-grid" id="gameGrid">
    <!-- populated by app.js -->
  </main>

  <!-- MODAL OVERLAY -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div class="modal-title-block">
          <span class="modal-emoji" id="modalEmoji"></span>
          <div>
            <h2 id="modalTitle"></h2>
            <span class="modal-category" id="modalCategory"></span>
          </div>
        </div>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <p class="modal-desc" id="modalDesc"></p>
      <div class="modal-tags" id="modalTags"></div>
      <div class="iframe-wrap">
        <iframe id="gameFrame" allowfullscreen allow="fullscreen"></iframe>
      </div>
      <div class="modal-actions">
        <button class="btn-fullscreen" id="btnFullscreen">⛶ Fullscreen</button>
        <a class="btn-open" id="btnOpen" target="_blank" rel="noopener">↗ Open in New Tab</a>
      </div>
    </div>
  </div>

  <!-- EMPTY STATE -->
  <div class="empty-state" id="emptyState" style="display:none;">
    <span>🔭</span>
    <p>No simulations found.<br/>Try a different search or category.</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
